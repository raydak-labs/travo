name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            arch: aarch64
            package_arch: aarch64_cortex-a53
          - goos: linux
            goarch: amd64
            arch: x86_64
            package_arch: x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile backend
        working-directory: backend
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o "../dist/travo" \
            ./cmd/server

      - name: Build install tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARCH: ${{ matrix.package_arch }}
        run: bash scripts/package-tarball.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/travo_*.tar.gz artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 5

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Quick Install (OpenWRT)

            ```sh
            wget -O- https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            Or install a specific version:

            ```sh
            VERSION=${{ steps.version.outputs.VERSION }} \
              wget -O- https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            ## Downloads

            | Architecture | Install tarball |
            |---|---|
            | aarch64 (GL.iNet MT3000/AXT1800) | `travo_${{ steps.version.outputs.VERSION }}_aarch64_cortex-a53.tar.gz` |
            | x86_64 | `travo_${{ steps.version.outputs.VERSION }}_x86_64.tar.gz` |

            See [SHA256SUMS](SHA256SUMS) for checksums.
