name: Release

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  build-and-release:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            arch: aarch64
            package_arch: aarch64_cortex-a53
          - goos: linux
            goarch: amd64
            arch: x86_64
            package_arch: x86_64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile backend
        working-directory: backend
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../dist/travo" \
            ./cmd/server

      - name: Build install tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARCH: ${{ matrix.package_arch }}
        run: bash scripts/package-tarball.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/travo_*.tar.gz artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 5

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/* \
            --notes "$(cat <<EOF
          ## Quick Install (OpenWRT)

          \`\`\`sh
          wget -O- https://raw.githubusercontent.com/${REPOSITORY}/main/scripts/install.sh | sh
          \`\`\`

          Or install a specific version:

          \`\`\`sh
          VERSION=${VERSION} \\
            wget -O- https://raw.githubusercontent.com/${REPOSITORY}/main/scripts/install.sh | sh
          \`\`\`

          ## Downloads

          | Architecture | Install tarball |
          |---|---|
          | aarch64 (GL.iNet MT3000/AXT1800) | \`travo_${VERSION}_aarch64_cortex-a53.tar.gz\` |
          | x86_64 | \`travo_${VERSION}_x86_64.tar.gz\` |

          See [SHA256SUMS](SHA256SUMS) for checksums.
          EOF
          )"
