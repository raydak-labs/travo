name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            arch: aarch64
            package_arch: aarch64_cortex-a53
          - goos: linux
            goarch: amd64
            arch: x86_64
            package_arch: x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile backend
        working-directory: backend
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o "../dist/travo" \
            ./cmd/server

      - name: Build install tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARCH: ${{ matrix.package_arch }}
        run: bash scripts/package-tarball.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/travo_*.tar.gz artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 5

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Quick Install (OpenWRT)

            ```sh
            wget -O- https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            Or install a specific version:

            ```sh
            VERSION=${{ steps.version.outputs.VERSION }} \
              wget -O- https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            ## Downloads

            | Architecture | Install tarball |
            |---|---|
            | aarch64 (GL.iNet MT3000/AXT1800) | `travo_${{ steps.version.outputs.VERSION }}_aarch64_cortex-a53.tar.gz` |
            | x86_64 | `travo_${{ steps.version.outputs.VERSION }}_x86_64.tar.gz` |

            See [SHA256SUMS](SHA256SUMS) for checksums.
