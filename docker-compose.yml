services:
  frontend:
    image: node:24-alpine@sha256:01743339035a5c3c11a373cd7c83aeab6ed1457b55da6a69e014a95ac4e4700b
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - frontend_node_modules:/app/frontend/node_modules
      - shared_node_modules:/app/shared/node_modules
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=development
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev --host"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - '3000:3000'
    environment:
      - MOCK_MODE=true
      - PORT=3000

volumes:
  frontend_node_modules:
  shared_node_modules:
  go_mod_cache:
