root = "."
tmp_dir = "tmp"

[build]
    bin = "./tmp/server"
    cmd = "go build -o ./tmp/server ./cmd/server"
    delay = 1000
    exclude_dir = ["tmp", "vendor"]
    exclude_file = []
    exclude_regex = ["_test\\.go$"]
    exclude_unchanged = false
    follow_symlink = false
    full_bin = "./tmp/server --mock"
    include_dir = []
    include_ext = ["go", "toml"]
    kill_delay = 0
    log = "build-errors.log"
    send_interrupt = false
    stop_on_error = true

[color]
    app = ""
    build = "yellow"
    main = "magenta"
    runner = "green"
    watcher = "cyan"

[log]
    time = false

[misc]
    clean_on_exit = true
